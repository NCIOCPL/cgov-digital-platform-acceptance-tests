name: Run Cypress tests against ACSF/automation-installed
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: ".../automation-installed test base url"
        required: true
        type: string
      akamai_staging:
        description: "Run test on Akamai staging network"
        type: boolean
        default: false
jobs:
  cypress_regression_acsf:
    name: Running cypress regression tests on ACSF
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      ## This clones and checks out.
      - name: Checkout branch
        uses: actions/checkout@v2
      - name: Normalize URL inputs
        run: |
          base_url="$(printf '%s' "$BASE_URL_INPUT" | sed -E 's/^[[:space:]]+//; s#[[:space:]/]*$##')"
          echo "BASE_URL=$base_url" >> "$GITHUB_ENV"
        env:
          BASE_URL_INPUT: ${{ inputs.base_url }}
      ## Setup node and npm caching.
      - name: Setup Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      ## Override for Akamai staging
      - name: Update hosts file
        if: ${{ inputs.akamai_staging }}
        run: |
          # Retrieve the Akamai staging network IP
          domain=$(printf '%s' "$BASE_URL" | sed -E 's|https?://([^/]+).*|\1|')
          subdomain=$(printf '%s' "$BASE_URL" | sed -E 's|https?://([^/]+)\.cancer\.gov.*|\1|')
          IFS=- read -r _ tier _ <<< "$subdomain"
          if [[ -z "$tier" ]]; then
            tier="prod"
          fi
          ip_address=$(nslookup akamai-$tier.cancer.gov.edgekey-staging.net | awk '/^Address: / {print $2; exit}')

          # Check if an IP address was found
          if [ -n "$ip_address" ]; then
            echo "$ip_address $domain" | sudo tee -a /etc/hosts
          else
              echo "No IP address found."
              exit 1
          fi
        ## Install using CI
      - name: Install Dependencies
        run: npm ci
      ### Run Cypress functional tests against /automation-installed
      - name: Run tests
        run:
          CYPRESS_baseUrl="$BASE_URL" CYPRESS_front_end_base_url="$BASE_URL" npm run cypress:acsf
          ## Upload screenshots of failed tests
      - uses: actions/upload-artifact@v4
        name: Upload failed tests
        if: failure()
        with:
          name: cypress-screenshots
          path: /home/runner/work/cgov-digital-platform-acceptance-tests/cgov-digital-platform-acceptance-tests/cypress/screenshots
