name: Run Cypress functional regression tests
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Test base url (ode or ac)"
        required: true
        type: string
jobs:
  cypress_regression:
    name: Running cypress regression tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      ## This clones and checks out.
      - name: Checkout branch
        uses: actions/checkout@v2
      - name: Normalize URL inputs
        run: |
          base_url="$(printf '%s' "$BASE_URL_INPUT" | sed -E 's/^[[:space:]]+//; s#[[:space:]/]*$##')"
          echo "BASE_URL=$base_url" >> "$GITHUB_ENV"
        env:
          BASE_URL_INPUT: ${{ inputs.base_url }}
      ## Setup node and npm caching.
      - name: Setup Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      ## Install using CI
      - name: Install Dependencies
        run: npm ci
      ### Run Cypress functional tests
      - name: Run tests
        run:
          CYPRESS_baseUrl="$BASE_URL" CYPRESS_front_end_base_url="$BASE_URL" CYPRESS_ocpl_password='${{ secrets.ocpl_password }}' CYPRESS_admin_password='${{ secrets.admin_password }}' npm test
          ## Upload screenshots of failed tests
      - uses: actions/upload-artifact@v4
        name: Upload failed tests
        if: failure()
        with:
          name: cypress-screenshots
          path: /home/runner/work/cgov-digital-platform-acceptance-tests/cgov-digital-platform-acceptance-tests/cypress/screenshots
