name: Run Cypress CMS regression tests
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "CMS url (ode, ac or acsf, NOT acsf/automation-installed)"
        required: true
        type: string
      front_end_base_url:
        description: "Front end url (ode, ac or acsf, NOT acsf/automation-installed)"
        required: true
        type: string
jobs:
  cypress_cms_regression:
    name: Running cypress CMS regression tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      ## This clones and checks out.
      - name: Checkout branch
        uses: actions/checkout@v2
      - name: Normalize URL inputs
        run: |
          normalize_url() {
            printf '%s' "$1" | sed -E 's/^[[:space:]]+//; s#[[:space:]/]*$##'
          }

          base_url="$(normalize_url "$BASE_URL_INPUT")"
          front_end_base_url="$(normalize_url "$FRONT_END_BASE_URL_INPUT")"
          {
            echo "BASE_URL=$base_url"
            echo "FRONT_END_BASE_URL=$front_end_base_url"
          } >> "$GITHUB_ENV"
        env:
          BASE_URL_INPUT: ${{ inputs.base_url }}
          FRONT_END_BASE_URL_INPUT: ${{ inputs.front_end_base_url }}
      ## Setup node and npm caching.
      - name: Setup Node
        uses: actions/setup-node@v4.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
      ## Install using CI
      - name: Install Dependencies
        run:
          npm ci
          ### Run Cypress CMS tests
      - name: Run tests
        run: CYPRESS_baseUrl="$BASE_URL" CYPRESS_front_end_base_url="$FRONT_END_BASE_URL" CYPRESS_admin_password='${{ secrets.admin_password }}' npm run cypress:cms
        ## Upload screenshots of failed tests
      - uses: actions/upload-artifact@v4
        name: Upload failed tests
        if: failure()
        with:
          name: cypress-screenshots
          path: /home/runner/work/cgov-digital-platform-acceptance-tests/cgov-digital-platform-acceptance-tests/cypress/screenshots
